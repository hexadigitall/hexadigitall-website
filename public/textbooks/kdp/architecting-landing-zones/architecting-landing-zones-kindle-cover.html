<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Architecting Landing Zones — Kindle Cover</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    @page { size: 5.333in 8.533in; margin: 0; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body { width: 5.333in; height: 8.533in; overflow: hidden; font-family: 'Inter', sans-serif; }
    .cover {
      position: relative; width: 100%; height: 100%; color: #fff;
      background:
        radial-gradient(circle at 16% 18%, rgba(197,160,89,0.22), transparent 32%),
        radial-gradient(circle at 82% 14%, rgba(59,130,246,0.24), transparent 28%),
        linear-gradient(160deg, #07111f 0%, #0b2542 46%, #0f2d4e 100%);
    }
    .cover::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .inner { position: relative; z-index: 1; height: 100%; padding: 0.34in; display: flex; flex-direction: column; }
    .logo { width: 1.12in; filter: brightness(0) invert(1); }
    .hero { margin-top: 0.28in; border-radius: 14px; overflow: hidden; height: 2.2in; box-shadow: 0 16px 34px rgba(0,0,0,0.28); }
    .hero img { width: 100%; height: 100%; object-fit: cover; opacity: 0.74; }
    .label { margin-top: 0.28in; color: #c5a059; font-size: 7pt; font-weight: 700; letter-spacing: 2.8px; text-transform: uppercase; }
    h1 { margin-top: 0.1in; font-family: 'Space Grotesk', sans-serif; font-size: 23pt; line-height: 1.05; }
    .subtitle { margin-top: 0.1in; font-size: 8.5pt; line-height: 1.5; color: rgba(255,255,255,0.84); }
    .meta { margin-top: 0.22in; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .meta div { border: 1px solid rgba(255,255,255,0.14); border-radius: 12px; padding: 8px 7px; font-size: 6.5pt; text-transform: uppercase; letter-spacing: 1px; text-align: center; color: #e6edf5; }
    .footer { margin-top: auto; font-size: 7.4pt; line-height: 1.5; color: rgba(255,255,255,0.76); }
    .footer strong { display: block; font-family: 'Space Grotesk', sans-serif; font-size: 10pt; color: #fff; }
  </style>
</head>
<body>
  <div class="cover">
    <div class="inner">
      <img class="logo" src="../../../hexadigitall-logo-transparent.svg" alt="Hexadigitall">
      <div class="hero">
        <img src="../../../assets/images/courses/architecting-landing-zones.jpg" alt="Architecting Landing Zones">
      </div>
      <div class="label">Advanced Cloud Infrastructure</div>
      <h1>Architecting<br>Landing Zones</h1>
      <p class="subtitle">Enterprise account governance, network segmentation, platform baselines, and operational handover patterns.</p>
      <div class="meta">
        <div>14 weeks</div>
        <div>28 sessions</div>
        <div>Advanced</div>
      </div>
      <div class="footer">
        <strong>Hexadigitall Technologies</strong>
        Foundations to Production
      </div>
    </div>
  </div>
</body>
</html>
