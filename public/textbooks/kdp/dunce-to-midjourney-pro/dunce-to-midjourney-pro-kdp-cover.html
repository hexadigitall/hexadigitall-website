<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dunce to Midjourney Pro — KDP Cover</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    @page { size: 6in 9in; margin: 0; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body { width: 6in; height: 9in; overflow: hidden; font-family: 'Inter', sans-serif; }
    .cover {
      position: relative; width: 6in; height: 9in; overflow: hidden; color: #fff;
      background:
        radial-gradient(circle at 18% 22%, rgba(52,152,219,0.28), transparent 34%),
        radial-gradient(circle at 78% 16%, rgba(231,76,60,0.22), transparent 30%),
        linear-gradient(160deg, #0d1b2a 0%, #1a2c42 45%, #0f2235 100%);
    }
    .cover::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 26px 26px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.9), rgba(0,0,0,0.4));
    }
    .inner { position: relative; z-index: 1; height: 100%; padding: 0.4in; display: flex; flex-direction: column; }
    .top { display: flex; justify-content: space-between; align-items: flex-start; }
    .logo { width: 1.4in; filter: brightness(0) invert(1); }
    .edition { border: 1px solid rgba(255,255,255,0.28); padding: 6px 10px; font-size: 7pt; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; }
    .hero { margin-top: 0.32in; border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; overflow: hidden; height: 2.6in; box-shadow: 0 18px 40px rgba(0,0,0,0.35); }
    .hero img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }
    .label { margin-top: 0.3in; color: #3498db; font-size: 8pt; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
    h1 { margin-top: 0.1in; font-family: 'Space Grotesk', sans-serif; font-size: 26pt; line-height: 1.04; }
    .subtitle { margin-top: 0.1in; font-size: 9.5pt; line-height: 1.5; color: rgba(255,255,255,0.84); }
    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 0.22in; }
    .pill { border: 1px solid rgba(52,152,219,0.5); color: #aed6f1; border-radius: 999px; padding: 5px 10px; font-size: 7pt; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .bottom { margin-top: auto; display: flex; justify-content: space-between; align-items: flex-end; gap: 0.15in; }
    .publisher { font-size: 8pt; line-height: 1.5; color: rgba(255,255,255,0.76); }
    .publisher strong { display: block; font-family: 'Space Grotesk', sans-serif; font-size: 11pt; color: #fff; }
    .qr { background: rgba(255,255,255,0.98); padding: 8px; border-radius: 10px; }
    .qr img { width: 0.8in; height: 0.8in; display: block; }
  </style>
</head>
<body>
  <div class="cover">
    <div class="inner">
      <div class="top">
        <img class="logo" src="../../../hexadigitall-logo-transparent.svg" alt="Hexadigitall">
        <div class="edition">Print Cover</div>
      </div>
      <div class="hero">
        <img src="./cover-img-dunce-to-midjourney-pro.png" alt="Dunce to Midjourney Pro">
      </div>
      <div class="label">AI Image Generation Mastery</div>
      <h1>Dunce to<br>Midjourney Pro</h1>
      <p class="subtitle">From zero to commercial-grade AI imagery: prompting, style architecture, surgical editing, and production-ready workflows.</p>
      <div class="pill-row">
        <div class="pill">4 phases</div>
        <div class="pill">11 chapters</div>
        <div class="pill">Midjourney</div>
      </div>
      <div class="bottom">
        <div class="publisher">
          <strong>Hexadigitall Technologies</strong>
          hexadigitall.com/courses/dunce-to-midjourney-pro
        </div>
        <div class="qr">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://hexadigitall.com/courses/dunce-to-midjourney-pro" alt="Course QR code">
        </div>
      </div>
    </div>
  </div>
</body>
</html>
